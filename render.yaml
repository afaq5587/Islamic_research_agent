services:
  - type: web
    name: islamic-guidance-assistant
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: OAUTH_QURAN_CLIENT_ID
        sync: false
      - key: OAUTH_QURAN_CLIENT_SECRET
        sync: false
